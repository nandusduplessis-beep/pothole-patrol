<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Clamped display → steady body. Phone-first." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-page); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--divider); padding: 5px 0; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); width: 96px; flex-shrink: 0; }
  .spec { font-family: var(--font-display); font-weight: 800; color: var(--text-strong); letter-spacing: -0.01em; white-space: nowrap; }
</style>
</head>
<body>
  <div class="line"><span class="tok">--text-h1</span><span class="spec" style="font-size:34px;">Name who failed</span></div>
  <div class="line"><span class="tok">--text-h2</span><span class="spec" style="font-size:27px;">Compare the applicants</span></div>
  <div class="line"><span class="tok">--text-h3</span><span class="spec" style="font-size:21px;">Who owns this failure now?</span></div>
  <div class="line"><span class="tok">--text-lg</span><span class="spec" style="font-size:17px; font-weight:600; font-family:var(--font-body);">Mapped pothole evidence</span></div>
  <div class="line"><span class="tok">--text-base</span><span class="spec" style="font-size:16px; font-weight:400; font-family:var(--font-body);">Body copy default · 16px</span></div>
  <div class="line"><span class="tok">--text-sm</span><span class="spec" style="font-size:14px; font-weight:400; font-family:var(--font-body); color:var(--text-muted);">Secondary / captions · 14px</span></div>
</body>
</html>
