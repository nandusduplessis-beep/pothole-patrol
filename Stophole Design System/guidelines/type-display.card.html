<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .meta { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  .big { font-family: var(--font-display); font-weight: 900; font-size: 46px; line-height: 1.0; letter-spacing: -0.02em; color: var(--text-strong); margin: 0; }
  .sub { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.01em; color: var(--text-body); margin: 12px 0 0; }
</style>
</head>
<body>
  <div class="meta">Archivo · 800–900 · tracking -0.02em</div>
  <h1 class="big">Stop the asshole. <span class="sh-mark" style="padding: 2px 10px 1px">Fix the road.</span></h1>
  <p class="sub">Who owns this failure now?</p>
</body>
</html>
