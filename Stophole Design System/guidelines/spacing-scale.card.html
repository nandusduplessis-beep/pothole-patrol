<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid. Tight within cards, generous between bands." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; align-items: flex-end; gap: 16px; }
  .item { text-align: center; }
  .bar { background: var(--accent); border-radius: 3px 3px 0 0; width: 26px; }
  .tok { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); margin-top: 7px; }
  .px { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--text-strong); }
</style>
</head>
<body>
  <div class="item"><div class="px">4</div><div class="bar" style="height:4px;"></div><div class="tok">1</div></div>
  <div class="item"><div class="px">8</div><div class="bar" style="height:8px;"></div><div class="tok">2</div></div>
  <div class="item"><div class="px">12</div><div class="bar" style="height:12px;"></div><div class="tok">3</div></div>
  <div class="item"><div class="px">16</div><div class="bar" style="height:16px;"></div><div class="tok">4</div></div>
  <div class="item"><div class="px">24</div><div class="bar" style="height:24px;"></div><div class="tok">6</div></div>
  <div class="item"><div class="px">32</div><div class="bar" style="height:32px;"></div><div class="tok">8</div></div>
  <div class="item"><div class="px">48</div><div class="bar" style="height:48px;"></div><div class="tok">12</div></div>
  <div class="item"><div class="px">64</div><div class="bar" style="height:64px;"></div><div class="tok">16</div></div>
  <div class="item"><div class="px">80</div><div class="bar" style="height:80px;"></div><div class="tok">20</div></div>
</body>
</html>
