<!-- @dsCard group="Colors" viewport="700x160" name="Charcoal & Soft Grey" subtitle="Warm-neutral asphalt scale — ink, structure, surfaces." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: flex; gap: 6px; margin-bottom: 6px; }
  .sw { flex: 1; height: 58px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);
        display: flex; align-items: flex-end; padding: 6px; }
  .lab { font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--charcoal-950);"><span class="lab" style="color:#fff;">950</span></div>
    <div class="sw" style="background: var(--charcoal-900);"><span class="lab" style="color:#fff;">900</span></div>
    <div class="sw" style="background: var(--charcoal-850);"><span class="lab" style="color:#fff;">850</span></div>
    <div class="sw" style="background: var(--charcoal-800);"><span class="lab" style="color:#fff;">800</span></div>
    <div class="sw" style="background: var(--charcoal-700);"><span class="lab" style="color:#fff;">700</span></div>
    <div class="sw" style="background: var(--charcoal-600);"><span class="lab" style="color:#fff;">600</span></div>
    <div class="sw" style="background: var(--grey-500);"><span class="lab" style="color:#fff;">g500</span></div>
  </div>
  <div class="row">
    <div class="sw" style="background: var(--grey-400);"><span class="lab" style="color:#fff;">400</span></div>
    <div class="sw" style="background: var(--grey-300);"><span class="lab">300 soft</span></div>
    <div class="sw" style="background: var(--grey-250);"><span class="lab">250</span></div>
    <div class="sw" style="background: var(--grey-200);"><span class="lab">200</span></div>
    <div class="sw" style="background: var(--grey-150);"><span class="lab">150</span></div>
    <div class="sw" style="background: var(--grey-100);"><span class="lab">100</span></div>
    <div class="sw" style="background: var(--grey-50);"><span class="lab">50</span></div>
  </div>
</body>
</html>
