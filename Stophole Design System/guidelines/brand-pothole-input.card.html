<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); display: flex; justify-content: center; }
  .pothole {
    position: relative; width: 320px; height: 220px; cursor: text;
    border-radius: 47% 53% 58% 42% / 52% 44% 56% 48%;
    background: radial-gradient(120% 120% at 50% 30%, #3a3834 0%, #211f1c 42%, #161412 70%, #0c0b0a 100%);
    box-shadow: inset 0 18px 38px rgba(0,0,0,0.66), inset 0 -10px 26px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.04), 0 4px 16px rgba(0,0,0,0.18);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    border: 1px solid var(--charcoal-950);
  }
  .icon { width: 54px; height: 54px; border-radius: 999px; background: var(--accent); display: grid; place-items: center; color: var(--charcoal-900); box-shadow: 0 6px 18px rgba(0,0,0,0.55), inset 0 -2px 0 var(--yellow-700); }
  .ph { font-family: var(--font-body); font-weight: 600; color: var(--grey-150); font-size: 16px; }
  .sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-400); }
</style>
</head>
<body>
  <div class="pothole">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"></path><circle cx="12" cy="13" r="3"></circle></svg>
    </div>
    <div class="ph">Snap the pothole</div>
    <div class="sub">or type an address</div>
  </div>
</body>
</html>
