<!-- @dsCard group="Type" viewport="700x180" name="Data & Labels" subtitle="No monospace. Tabular figures on the body grotesque do the work." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; gap: 44px; align-items: center; flex-wrap: wrap; }
  .eyebrow { font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .data { font-family: var(--font-body); font-weight: 700; letter-spacing: -0.01em; color: var(--text-strong); font-variant-numeric: tabular-nums; }
  .lg { font-size: 32px; line-height: 1; }
  .md { font-size: 19px; }
</style>
</head>
<body>
  <div><div class="eyebrow">Ward</div><div class="data lg">102</div></div>
  <div><div class="eyebrow">Salary band</div><div class="data lg">R270k–R650k</div></div>
  <div><div class="eyebrow">Known since</div><div class="data md">102 days</div></div>
  <div><div class="eyebrow">Vote date</div><div class="data md">04 Nov 2026</div></div>
</body>
</html>
