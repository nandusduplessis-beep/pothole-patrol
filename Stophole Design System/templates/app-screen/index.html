<!-- @template name="Stophole App Screen" description="Phone-frame screen scaffold with the charcoal/yellow brand, pothole input, verdict badges and stat tiles wired up." -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stophole — App Screen Template</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 40px 16px;
    background: var(--surface-page, #F8F6F2); font-family: var(--font-body, sans-serif); }
  .frame { width: 360px; height: 740px; border-radius: 46px; background: var(--charcoal-950, #0E0E0D);
    padding: 9px; box-shadow: 0 30px 70px -20px rgba(14,14,13,0.45); position: relative; }
  .screen { width: 100%; height: 100%; border-radius: 38px; background: var(--surface-page);
    overflow: hidden; display: flex; flex-direction: column; }
  .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 116px;
    height: 26px; background: var(--charcoal-950); border-radius: 0 0 18px 18px; z-index: 30; }
  .pad { padding: 24px 18px; display: flex; flex-direction: column; gap: 18px; }
  h1 { font-family: var(--font-display); font-weight: 900; font-size: 32px; line-height: 1.02;
    letter-spacing: -0.025em; color: var(--text-strong); margin: 8px 0 0; }
  .muted { color: var(--text-muted); }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // The DS bundle loads async via ds-base.js — wait for window load, then mount.
    function mount() {
      const NS = window.StopholeDesignSystem_1ea2d7;
      if (!NS || !NS.Button) { return setTimeout(mount, 60); }
      const { Button, Icon, Tag, VerdictBadge, StatTile, PotholeInput } = NS;

      function Screen() {
        return (
          <div className="frame">
            <div className="notch" />
            <div className="screen">
              <div className="pad">
                <Tag>Ward 102 · Sandton</Tag>
                <h1>Snap it. <span className="muted">Name them.</span></h1>
                <div style={{ display: 'flex', justifyContent: 'center' }}>
                  <PotholeInput width={300} height={190} />
                </div>
                <div className="stats">
                  <StatTile label="Open" value="102" unit="d" />
                  <StatTile label="Salary" value="R650k" tone="yellow" />
                </div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <VerdictBadge verdict="red" label="Replace" />
                  <VerdictBadge verdict="green" />
                </div>
                <Button variant="primary" size="lg" fullWidth trailingIcon={<Icon name="arrow-right" size={16} />}>
                  See candidates
                </Button>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<Screen />);
    }
    window.addEventListener('load', mount);
  </script>
</body>
</html>
